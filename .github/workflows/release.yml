name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: 'Version bump type (ignored if version is set)'
        type: choice
        options:
          - minor
          - major
          - patch
        default: minor
      version:
        description: 'Specific version (e.g. 1.2.3); overrides bump'
        type: string
        required: false
        default: ''

permissions:
  contents: write

jobs:
  prepare:
    name: Prepare release
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.compute.outputs.version }}
      tag: ${{ steps.compute.outputs.tag }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - name: Compute new version
        id: compute
        env:
          BUMP: ${{ inputs.bump }}
          VERSION: ${{ inputs.version }}
        run: |
          set -euo pipefail
          if [ -n "$VERSION" ]; then
            new="$VERSION"
          else
            latest=$(git tag --list 'v*' --sort=-v:refname | head -n1)
            if [ -n "$latest" ]; then
              current="${latest#v}"
            else
              current=$(grep -m1 '^version = ' Cargo.toml | sed -E 's/version = "(.*)"/\1/')
            fi
            IFS=. read -r major minor patch <<< "$current"
            case "$BUMP" in
              major) new="$((major+1)).0.0" ;;
              minor) new="$major.$((minor+1)).0" ;;
              patch) new="$major.$minor.$((patch+1))" ;;
              *) echo "invalid bump: $BUMP" >&2; exit 1 ;;
            esac
          fi
          if ! [[ "$new" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$ ]]; then
            echo "invalid semver: $new" >&2
            exit 1
          fi
          echo "version=$new" >> "$GITHUB_OUTPUT"
          echo "tag=v$new" >> "$GITHUB_OUTPUT"
          echo "Releasing v$new"
      - name: Refuse existing tag
        env:
          TAG: ${{ steps.compute.outputs.tag }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG already exists" >&2
            exit 1
          fi

  build:
    name: Build ${{ matrix.target }}
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-apple-darwin
            os: macos-15-intel
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-24.04-arm
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.sha }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: taiki-e/install-action@184183c2401be73c3bf42c2e61268aa5855379c1 # v2.78.1
        with:
          tool: cargo-edit
      - name: Bump package version
        env:
          NEW: ${{ needs.prepare.outputs.version }}
        run: cargo set-version "$NEW"
      - name: Add target
        run: rustup target add ${{ matrix.target }}
      - uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4 # v2.9.1
        with:
          key: release-${{ matrix.target }}
      - name: Build
        run: cargo build --release --locked --target ${{ matrix.target }}
      - name: Package
        env:
          TARGET: ${{ matrix.target }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          name="zsh-clean-history-${VERSION}-${TARGET}"
          mkdir -p "dist/$name"
          cp "target/${TARGET}/release/zsh-clean-history" "dist/$name/"
          cp README.md LICENSE zsh-clean-history.plugin.zsh "dist/$name/"
          cp -r completions man "dist/$name/"
          cd dist
          tar czf "$name.tar.gz" "$name"
          shasum -a 256 "$name.tar.gz" > "$name.tar.gz.sha256"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: artifact-${{ matrix.target }}
          path: |
            dist/*.tar.gz
            dist/*.tar.gz.sha256
          if-no-files-found: error
          retention-days: 7

  release:
    name: Publish GitHub release
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0
          ref: ${{ github.sha }}
      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        env:
          GITHUB_TOKEN: ${{ github.token }}
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - name: Verify artifacts and tag
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null; then
            echo "tag $TAG already exists" >&2
            exit 1
          fi
          for target in \
            aarch64-apple-darwin \
            x86_64-apple-darwin \
            x86_64-unknown-linux-gnu \
            aarch64-unknown-linux-gnu
          do
            artifact="dist/zsh-clean-history-${VERSION}-${target}.tar.gz"
            checksum="$artifact.sha256"
            test -s "$artifact"
            test -s "$checksum"
            checksum_name="zsh-clean-history-${VERSION}-${target}.tar.gz.sha256"
            (cd dist && shasum -a 256 -c "$checksum_name")
          done
      - name: Tag and push
        env:
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          git tag "$TAG"
          git push origin "$TAG"
      - name: Create release
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ needs.prepare.outputs.tag }}
        run: |
          set -euo pipefail
          gh release create "$TAG" \
            --title "$TAG" \
            --generate-notes \
            dist/*.tar.gz dist/*.tar.gz.sha256

  tap:
    name: Update Homebrew tap
    needs: [prepare, release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: dist
          merge-multiple: true
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: Automaat/homebrew-tap
          token: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          path: homebrew-tap
      - name: Render formula
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          set -euo pipefail
          sha() { cut -d' ' -f1 < "dist/zsh-clean-history-${VERSION}-$1.tar.gz.sha256"; }
          SHA_DARWIN_ARM=$(sha aarch64-apple-darwin)
          SHA_DARWIN_X86=$(sha x86_64-apple-darwin)
          SHA_LINUX_X86=$(sha x86_64-unknown-linux-gnu)
          SHA_LINUX_ARM=$(sha aarch64-unknown-linux-gnu)
          base="https://github.com/Automaat/zsh-clean-history/releases/download/v${VERSION}"
          cat > homebrew-tap/zsh-clean-history.rb <<'RB'
          # typed: false
          # frozen_string_literal: true

          # Generated by the zsh-clean-history release workflow. DO NOT EDIT.
          class ZshCleanHistory < Formula
            desc "Smart zsh history cleanup: removes typos and failed commands"
            homepage "https://github.com/Automaat/zsh-clean-history"
            version "@VERSION@"
            license "MIT"

            on_macos do
              if Hardware::CPU.arm?
                url "@BASE@/zsh-clean-history-@VERSION@-aarch64-apple-darwin.tar.gz"
                sha256 "@SHA_DARWIN_ARM@"
              end
              if Hardware::CPU.intel?
                url "@BASE@/zsh-clean-history-@VERSION@-x86_64-apple-darwin.tar.gz"
                sha256 "@SHA_DARWIN_X86@"
              end
            end

            on_linux do
              if Hardware::CPU.arm? && Hardware::CPU.is_64_bit?
                url "@BASE@/zsh-clean-history-@VERSION@-aarch64-unknown-linux-gnu.tar.gz"
                sha256 "@SHA_LINUX_ARM@"
              end
              if Hardware::CPU.intel? && Hardware::CPU.is_64_bit?
                url "@BASE@/zsh-clean-history-@VERSION@-x86_64-unknown-linux-gnu.tar.gz"
                sha256 "@SHA_LINUX_X86@"
              end
            end

            def install
              bin.install "zsh-clean-history"
              man1.install "man/zsh-clean-history.1"
              zsh_completion.install "completions/_zsh-clean-history"
              bash_completion.install "completions/zsh-clean-history.bash"
              fish_completion.install "completions/zsh-clean-history.fish"
              pkgshare.install "zsh-clean-history.plugin.zsh"
            end

            def caveats
              <<~EOS
                To record exit codes, source the plugin from your ~/.zshrc:
                  source #{opt_pkgshare}/zsh-clean-history.plugin.zsh
              EOS
            end

            test do
              system bin/"zsh-clean-history", "--version"
            end
          end
          RB
          sed -i \
            -e "s|@VERSION@|${VERSION}|g" \
            -e "s|@BASE@|${base}|g" \
            -e "s|@SHA_DARWIN_ARM@|${SHA_DARWIN_ARM}|g" \
            -e "s|@SHA_DARWIN_X86@|${SHA_DARWIN_X86}|g" \
            -e "s|@SHA_LINUX_ARM@|${SHA_LINUX_ARM}|g" \
            -e "s|@SHA_LINUX_X86@|${SHA_LINUX_X86}|g" \
            homebrew-tap/zsh-clean-history.rb
      - name: Commit and push
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        working-directory: homebrew-tap
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add zsh-clean-history.rb
          if git diff --cached --quiet; then
            echo "formula already up to date"
            exit 0
          fi
          git commit -m "zsh-clean-history ${VERSION}"
          git push
