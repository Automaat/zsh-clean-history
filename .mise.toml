[tools]
rust = "1.95.0"
shellcheck = "0.11.0"
actionlint = "1.7.12"

[tasks.build]
description = "Build release binary"
run = "cargo build --release"

[tasks.install]
description = "Install binary to ~/.cargo/bin"
run = "cargo install --path . --locked"

[tasks.test]
description = "Run all tests"
run = "cargo test --all-targets"

[tasks.test-cov]
description = "Run tests with coverage (cargo-llvm-cov required)"
run = "cargo llvm-cov --all-targets --lcov --output-path lcov.info"

[tasks.check]
description = "Lint, format-check, syntax-check"
run = [
  "cargo fmt --all -- --check",
  "cargo clippy --all-targets -- -D warnings",
  "zsh -n zsh-clean-history.plugin.zsh",
  "actionlint",
]

[tasks.fmt]
description = "Format Rust code"
run = "cargo fmt --all"

[tasks.audit]
description = "Audit deps for RustSec advisories (cargo-audit required)"
run = "cargo audit --deny warnings"
